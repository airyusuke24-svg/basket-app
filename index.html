<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>募集登録</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #f5f6f8;
      color: #111;
    }
    .wrap {
      max-width: 560px;
      margin: 24px auto;
      background: #fff;
      border-radius: 18px;
      padding: 24px 22px 28px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 30px;
      margin: 0 0 24px;
    }
    .section {
      margin-bottom: 18px;
    }
    .label {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip {
      border: 2px solid #ccc;
      background: #eee;
      color: #2580ff;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 17px;
      cursor: pointer;
    }
    .chip.active {
      background: #2f55d4;
      color: #fff;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      margin-top: 8px;
    }
    textarea {
      min-height: 90px;
    }
    .note {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
      margin-top: 14px;
    }
    button {
      width: 100%;
      border: none;
      background: #2f55d4;
      color: #fff;
      font-size: 22px;
      padding: 16px;
      border-radius: 12px;
      margin-top: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>募集登録</h1>

    <div class="section">
      <div class="label">日付</div>
      <input type="date" />
    </div>

    <div class="section">
      <div class="label">地域</div>
      <div class="chips">
        <div class="chip active">神戸</div>
        <div class="chip">阪神</div>
        <div class="chip">東播</div>
        <div class="chip">西播</div>
        <div class="chip">北播</div>
        <div class="chip">丹波</div>
        <div class="chip">但馬</div>
        <div class="chip">淡路</div>
      </div>
    </div>

    <div class="section">
      <div class="label">カテゴリー</div>
      <div class="chips">
        <div class="chip active">U12</div>
        <div class="chip">U11</div>
        <div class="chip">U10</div>
        <div class="chip">U9</div>
      </div>
    </div>

    <div class="section">
      <div class="label">試合の種類</div>
      <div class="chips">
        <div class="chip active">練習試合</div>
        <div class="chip">大会</div>
      </div>
    </div>

    <div class="section">
      <div class="label">レベル</div>
      <div class="chips">
        <div class="chip">県上位</div>
        <div class="chip active">県中位</div>
        <div class="chip">市内</div>
        <div class="chip">地域</div>
      </div>
    </div>

    <div class="section">
      <div class="label">募集チーム数</div>
      <div class="chips">
        <div class="chip active">1</div>
        <div class="chip">2</div>
        <div class="chip">3</div>
        <div class="chip">4</div>
        <div class="chip">6</div>
        <div class="chip">8</div>
      </div>
    </div>

    <div class="section">
      <div class="label">JBA登録</div>
      <div class="chips">
        <div class="chip active">あり</div>
        <div class="chip">なし</div>
        <div class="chip">どちらでも可</div>
      </div>
    </div>

    <div class="section">
      <div class="label">参加費</div>
      <p class="note">承認後に連絡</p>
    </div>

    <div class="section">
      <div class="label">メール（必須）</div>
      <input type="email" placeholder="例：example@gmail.com" />
    </div>

    <div class="section">
      <div class="label">詳細・備考</div>
      <textarea placeholder="会場、時間、条件など"></textarea>
    </div>

    <p class="note">
      ※対戦希望が届いた場合は、48時間以内を目安に承認または却下の判断をお願いします。<br>
      ※会場・詳細は承認後に共有してください。
    </p>

    <button>登録</button>
  </div>

  <script>
    document.querySelectorAll('.chips').forEach(group => {
      group.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
