<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>バスケ試合ナビ兵庫</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f7fb}
.app{max-width:430px;margin:auto;padding:10px}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px}
h1{font-size:20px;margin:0 0 10px}
label{font-size:14px}
input,select{width:100%;padding:8px;margin-top:5px;margin-bottom:10px}
button{width:100%;padding:10px;border:none;background:#007bff;color:#fff;border-radius:8px}
.list-item{border-bottom:1px solid #ddd;padding:8px 0}
</style>
</head>

<body>
<div class="app">

<h1>試合登録</h1>

<div class="card">
<label>日付</label>
<input type="date" id="date">

<label>チーム</label>
<select id="team">
<option>EPIC</option>
<option>神原・苦楽園</option>
<option>その他</option>
</select>

<label>レベル</label>
<select id="level">
<option>県上位</option>
<option>県中位</option>
<option>市内</option>
<option>地域</option>
</select>

<label>種別</label>
<select id="type">
<option>大会</option>
<option>練習試合</option>
</select>

<label>相手チーム</label>
<input id="opponent">

<button onclick="add()">登録</button>
</div>

<div class="card">
<h1>試合一覧</h1>
<div id="list"></div>
</div>

</div>

<script>
let data=[];

function add(){
  const item={
    date:document.getElementById("date").value,
    team:document.getElementById("team").value,
    level:document.getElementById("level").value,
    type:document.getElementById("type").value,
    opponent:document.getElementById("opponent").value
  };
  data.push(item);
  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";
  data.forEach(d=>{
    list.innerHTML+=`
      <div class="list-item">
        ${d.date} / ${d.team} / ${d.level}<br>
        ${d.type} vs ${d.opponent}
      </div>
    `;
  });
}
</script>

</body>
</html>
