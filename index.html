<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Basket Match</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.app{max-width:420px;margin:auto;padding:16px}
h1{font-size:28px;margin-bottom:12px}
.nav{display:flex;gap:8px;margin-bottom:16px}
.nav button{flex:1;padding:12px;border-radius:999px;border:none;background:#ddd;font-weight:bold}
.nav .on{background:#3150d4;color:#fff}

.page{display:none}
.page.on{display:block}

.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px}
.choice button{margin:4px;padding:10px 14px;border-radius:999px;border:1px solid #ccc}
.choice .on{background:#3150d4;color:#fff}

.btn{width:100%;padding:14px;border:none;border-radius:12px;background:#3150d4;color:#fff;font-size:18px}
</style>
</head>
<body>
<div class="app">

<h1>Basket Match</h1>

<div class="nav">
<button id="b1" class="on" onclick="tab('team')">チーム登録</button>
<button id="b2" onclick="tab('list')">試合を探す</button>
<button id="b3" onclick="tab('post')">試合募集</button>
<button id="b4" onclick="tab('info')">チーム情報</button>
</div>

<!-- チーム登録 -->
<div id="team" class="page on">
<div class="card">
<h2>チーム登録</h2>

<label>チーム名</label>
<input id="teamName">

<label>地域</label>
<div class="choice" id="area">
<button class="on" onclick="sel('area',this)">神戸</button>
<button onclick="sel('area',this)">阪神</button>
<button onclick="sel('area',this)">東播</button>
<button onclick="sel('area',this)">西播</button>
</div>

<label>JBA登録</label>
<div class="choice" id="jba">
<button class="on" onclick="sel('jba',this)">あり</button>
<button onclick="sel('jba',this)">なし</button>
</div>

<button class="btn" onclick="saveTeam()">登録</button>
</div>
</div>

<!-- 募集一覧 -->
<div id="list" class="page">
<div class="card">
<h2>4/29 練習試合</h2>
地域：阪神 / U12 / 県中位
</div>
</div>

<!-- 募集 -->
<div id="post" class="page">
<div class="card">
<h2>試合募集</h2>

<label>日付</label>
<input type="date" id="date">

<label>希望チーム数</label>
<div class="choice" id="teams">
<button class="on" onclick="sel('teams',this)">1</button>
<button onclick="sel('teams',this)">2</button>
<button onclick="sel('teams',this)">3</button>
<button onclick="sel('teams',this)">4</button>
<button onclick="sel('teams',this)">5</button>
<button onclick="sel('teams',this)">6</button>
<button onclick="sel('teams',this)">7</button>
<button onclick="sel('teams',this)">8</button>
</div>

<button class="btn" onclick="save()">登録</button>
</div>
</div>

<!-- チーム情報 -->
<div id="info" class="page">
<div class="card">
<h2>チーム情報</h2>

<div id="teamView">未登録</div>

<hr>

<h3>信頼ポイント</h3>
<p>
・返信の早さ<br>
・承認率<br>
・トラブルの少なさ<br>
</p>

</div>
</div>

</div>

<script>
function tab(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'))
document.getElementById(id).classList.add('on')

document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'))
event.target.classList.add('on')
}

function sel(id,btn){
document.querySelectorAll('#'+id+' button').forEach(b=>b.classList.remove('on'))
btn.classList.add('on')
}

function saveTeam(){
let name=document.getElementById('teamName').value
localStorage.setItem("team",name)
alert("登録OK")
}

function save(){
let d=document.getElementById("date").value
let today=new Date().toISOString().split('T')[0]
if(d<today){alert("過去NG");return}
alert("登録OK")
}

let t=localStorage.getItem("team")
if(t)document.getElementById("teamView").innerText=t
</script>

</body>
</html>
