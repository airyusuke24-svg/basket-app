<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>バスケ試合ナビ兵庫</title>

<style>
body{font-family:sans-serif;background:#f6f8fb;margin:0;padding:10px}
.card{background:#fff;padding:14px;border-radius:12px;margin-bottom:10px}
.btn{padding:14px;border-radius:10px;border:none;background:#1d4ed8;color:#fff;width:100%;font-size:16px}
.choice button{margin:4px;padding:10px;border-radius:20px;border:1px solid #ccc}
.on{background:#1d4ed8;color:#fff}
.small{font-size:12px;color:#666}

.header button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  background:#fff;
}
.header .active{
  background:#1d4ed8;
  color:white;
}
</style>
</head>

<body>

<!-- ヘッダー -->
<div class="header" style="display:flex;gap:6px;margin-bottom:10px;">
  <button onclick="showPage('team')" id="btn_team">チーム登録</button>
  <button onclick="showPage('search')" id="btn_search">試合を探す</button>
  <button onclick="showPage('post')" id="btn_post" class="active">試合募集</button>
  <button onclick="showPage('my')" id="btn_my">My Team</button>
</div>

<!-- 試合募集 -->
<div id="page_post" class="card">

<h2>試合を募集</h2>

<label>日付</label>
<input id="date" type="date">

<label>地域</label>
<div class="choice" id="city">
<button onclick="sel('city',this)" class="on">西宮</button>
<button onclick="sel('city',this)">尼崎</button>
<button onclick="sel('city',this)">神戸</button>
</div>

<label>カテゴリー</label>
<div class="choice" id="cat">
<button onclick="sel('cat',this)" class="on">U12</button>
<button onclick="sel('cat',this)">U11</button>
</div>

<label>試合の種類</label>
<div class="choice" id="type">
<button onclick="sel('type',this)" class="on">練習試合</button>
<button onclick="sel('type',this)">大会</button>
</div>

<label>レベル</label>
<div class="choice" id="level">
<button onclick="sel('level',this)">県上位</button>
<button onclick="sel('level',this)" class="on">県中位</button>
<button onclick="sel('level',this)">市内</button>
<button onclick="sel('level',this)">地域</button>
</div>

<label>募集チーム数</label>
<div class="choice" id="team">
<button onclick="sel('team',this)">1</button>
<button onclick="sel('team',this)" class="on">2</button>
<button onclick="sel('team',this)">3</button>
<button onclick="sel('team',this)">4</button>
<button onclick="sel('team',this)">6</button>
<button onclick="sel('team',this)">8</button>
</div>

<label>JBA登録</label>
<div class="choice" id="jba">
<button onclick="sel('jba',this)" class="on">あり</button>
<button onclick="sel('jba',this)">なし</button>
</div>

<label>参加費</label>
<input id="fee">

<label>メール（必須）</label>
<input id="mail">

<div class="small">
※対戦希望が届いた場合は、48時間以内に承認または却下をお願いします<br>
※会場・詳細は承認後に共有
</div>

<button class="btn" onclick="save()">登録</button>

</div>

<!-- 試合一覧 -->
<div id="page_search" style="display:none;"></div>

<!-- チーム登録 -->
<div id="page_team" style="display:none;">
  <div class="card">チーム登録（今後実装）</div>
</div>

<!-- My Team -->
<div id="page_my" style="display:none;">
  <div class="card">My Team（今後実装）</div>
</div>

<script>

let data=[];

// ページ切替（ここが重要）
function showPage(page){

  document.getElementById("page_post").style.display="none";
  document.getElementById("page_search").style.display="none";
  document.getElementById("page_team").style.display="none";
  document.getElementById("page_my").style.display="none";

  document.getElementById("page_"+page).style.display="block";

  // ボタン状態
  document.querySelectorAll(".header button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn_"+page).classList.add("active");
}

// 選択
function sel(id,btn){
  let parent=document.getElementById(id);
  [...parent.children].forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

// 値取得
function getVal(id){
  return document.querySelector("#"+id+" .on").innerText;
}

// 登録
function save(){

  let dateValue=document.getElementById("date").value;
  let mail=document.getElementById("mail").value;

  if(!dateValue){
    alert("日付を入力してください");
    return;
  }

  const today=new Date();
  today.setHours(0,0,0,0);
  const selected=new Date(dateValue);

  if(selected < today){
    alert("過去の日付は選択できません");
    return;
  }

  if(!mail){
    alert("メール必須");
    return;
  }

  data.push({
    date:dateValue,
    city:getVal("city"),
    cat:getVal("cat"),
    type:getVal("type"),
    level:getVal("level"),
    team:getVal("team"),
    jba:getVal("jba"),
    fee:document.getElementById("fee").value
  });

  render();
  alert("登録しました");
}

// 一覧
function render(){
  let html=data.map(d=>`
  <div class="card">
    <b>${d.city}</b>（${d.date}）<br>
    ${d.cat} / ${d.type}<br>
    ${d.level}<br>
    ${d.team}チーム募集<br>
    JBA:${d.jba}<br>
    参加費:${d.fee||"未定"}<br>
    <span class="small">🔒詳細は承認後</span>
  </div>`).join("");

  document.getElementById("page_search").innerHTML=html;
}

</script>

</body>
</html>
