<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Basket Match Simulation</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#f4f6f8;color:#111}
header{position:sticky;top:0;background:#fff;padding:14px;border-bottom:1px solid #ddd;z-index:10}
h1{margin:0;font-size:24px}.now{background:#eef2ff;color:#2f55d4;font-weight:800;border-radius:12px;padding:10px;margin-top:8px}
.tabs{display:flex;gap:6px;margin-top:12px;overflow-x:auto}.tab{padding:10px 14px;border-radius:999px;background:#eee;color:#2878ff;font-weight:800;white-space:nowrap}.tab.active{background:#2f55d4;color:#fff}
.page{display:none;padding:16px}.page.active{display:block}.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px #0001}
.title{font-size:21px;font-weight:900;margin-bottom:8px}.row{font-size:15px;color:#555;margin:7px 0}.note{font-size:14px;color:#666;line-height:1.6}
input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:10px;padding:12px;font-size:16px;background:#fff;margin-top:6px}
textarea{min-height:80px}button{width:100%;border:0;background:#2f55d4;color:#fff;font-size:17px;padding:14px;border-radius:12px;margin-top:10px;font-weight:800;transition:.15s}
button:active{transform:scale(.98);opacity:.8}.ok{background:#07833e}.danger{background:#c0392b}.sub{background:#666}.warn{background:#d98c00}.done{background:#aaa}
.badge{display:inline-block;background:#eef2ff;color:#2f55d4;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:800;margin:4px 3px 0 0}
.box{background:#fafafa;border-radius:12px;padding:12px;margin-top:10px}.big{font-size:22px;font-weight:900;color:#2f55d4;margin:8px 0}.success{background:#e8fff0;color:#07833e;border-radius:12px;padding:10px;margin-top:10px}
</style>
</head>
<body>

<header>
<h1>Basket Match</h1>
<div id="nowTeam" class="now">操作中チーム：未設定</div>
<div class="tabs">
  <div class="tab active" onclick="show('sim',this)">シミュレーション</div>
  <div class="tab" onclick="show('post',this)">試合を募集</div>
  <div class="tab" onclick="show('list',this)">試合を探す</div>
  <div class="tab" onclick="show('my',this)">自チーム情報</div>
</div>
</header>

<div id="sim" class="page active">
  <div class="card">
    <div class="title">A⇔B シミュレーション</div>
    <p class="note">A＝主催チーム、B＝応募チームとして、1人で流れを確認します。</p>

    <button onclick="resetAll(this)" class="danger">最初からやり直す</button>

    <div class="box">
      <b>① A氏を主催者として操作</b>
      <button onclick="setA(this)">A：EPICに切替</button>
    </div>

    <div class="box">
      <b>② A氏が試合を募集</b>
      <button onclick="quickCreateMatch(this)">Aの募集を作成</button>
    </div>

    <div class="box">
      <b>③ B氏を応募チームとして操作</b>
      <button onclick="setB(this)">B：神原ミニバスに切替</button>
    </div>

    <div class="box">
      <b>④ B氏がA氏の募集に応募</b>
      <button onclick="quickEntryB(this)">Bで応募する</button>
    </div>

    <div class="box">
      <b>⑤ A氏に戻って承認</b>
      <button onclick="setA(this)">A：EPICに切替</button>
      <button class="ok" onclick="quickApprove(this)">応募を承認する</button>
    </div>

    <div class="box">
      <b>⑥ B氏で結果確認</b>
      <button onclick="setB(this)">B：神原ミニバスに切替</button>
      <button class="sub" onclick="show('my',document.querySelectorAll('.tab')[3])">自チーム情報を見る</button>
    </div>
  </div>
</div>

<div id="post" class="page">
  <div class="card">
    <div class="title">試合を募集</div>
    <p class="note">操作中チームが主催者になります。</p>
    <label>試合日</label><input id="date" type="date">
    <label>時間帯</label><select id="time"><option value="">選択してください</option><option>AM</option><option>PM</option><option>終日</option></select>
    <label>地域</label><select id="area"><option value="">選択してください</option><option>阪神</option><option>神戸</option><option>東播</option><option>西播</option></select>
    <label>カテゴリー</label><select id="cat"><option value="">選択してください</option><option>U12</option><option>U11</option><option>U10</option><option>U9</option></select>
    <label>性別</label><select id="gender"><option value="">選択してください</option><option>男子</option><option>女子</option></select>
    <label>種別</label><select id="type"><option value="">選択してください</option><option>練習試合</option><option>大会</option><option>合同練習</option></select>
    <label>募集チーム数</label><select id="teams"><option value="">選択してください</option><option>1</option><option>2</option><option>3</option><option>4</option></select>
    <label>詳細</label><textarea id="note" placeholder="会場、条件など"></textarea>
    <button onclick="saveMatch(this)">募集を登録する</button>
    <div id="postMsg"></div>
  </div>
</div>

<div id="list" class="page">
  <div id="matchList"></div>
</div>

<div id="my" class="page">
  <div class="card">
    <div class="title">自チーム情報</div>
    <div id="teamInfo"></div>
    <hr>
    <div class="title">応募あり</div>
    <div id="applicants"></div>
    <hr>
    <div class="title">自チームの募集</div>
    <div id="myMatches"></div>
    <hr>
    <div class="title">エントリー中</div>
    <div id="myEntries"></div>
  </div>
</div>

<script>
let A={id:"A",name:"EPIC BASKETBALL",leader:"大西",email:"a@test.local",area:"阪神",jba:"あり"};
let B={id:"B",name:"神原ミニバス",leader:"テスト代表",email:"b@test.local",area:"阪神",jba:"あり"};
let active=load("active",null),matches=load("matches",[]),entries=load("entries",[]);

function load(k,d){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}}
function save(){localStorage.setItem("active",JSON.stringify(active));localStorage.setItem("matches",JSON.stringify(matches));localStorage.setItem("entries",JSON.stringify(entries))}
function today(){return new Date().toISOString().slice(0,10)}
function future(n){let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function react(btn,text){let old=btn.textContent;btn.textContent=text;btn.classList.add("ok");btn.disabled=true;setTimeout(()=>{btn.textContent=old;btn.classList.remove("ok");btn.disabled=false},700)}

function show(id,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  if(el)el.classList.add("active");
  render();
}
function setA(btn){active=A;save();react(btn,"Aに切替完了");render()}
function setB(btn){active=B;save();react(btn,"Bに切替完了");render()}

function resetAll(btn){
  if(!confirm("全データを消して最初からやり直しますか？"))return;
  matches=[];entries=[];active=null;save();react(btn,"リセット完了");render();
}

function quickCreateMatch(btn){
  active=A;
  let m={id:Date.now(),teamId:A.id,teamName:A.name,teamLeader:A.leader,teamEmail:A.email,date:future(14),time:"AM",area:"阪神",cat:"U12",gender:"男子",type:"練習試合",teams:2,note:"A氏が作成したシミュレーション用募集です。",status:"募集中"};
  matches.unshift(m);save();react(btn,"募集作成完了");render();
}
function quickEntryB(btn){
  active=B;
  let m=matches.find(x=>x.teamId==="A"&&x.status!=="募集終了");
  if(!m){alert("A氏の募集がありません");return}
  createEntry(m.id,"B氏からの応募です。よろしくお願いします。");
  react(btn,"応募完了");
}
function quickApprove(btn){
  active=A;
  let e=entries.find(x=>x.status==="申請中"&&matches.find(m=>m.id===x.matchId&&m.teamId==="A"));
  if(!e){alert("承認待ちの応募がありません");return}
  e.status="承認済み";save();react(btn,"承認完了");render();
}

function saveMatch(btn){
  if(!active){alert("先にAまたはBに切り替えてください");return}
  if(!date.value||!time.value||!area.value||!cat.value||!gender.value||!type.value||!teams.value){alert("未入力の項目があります");return}
  let m={id:Date.now(),teamId:active.id,teamName:active.name,teamLeader:active.leader,teamEmail:active.email,date:date.value,time:time.value,area:area.value,cat:cat.value,gender:gender.value,type:type.value,teams:Number(teams.value),note:note.value,status:"募集中"};
  matches.unshift(m);save();
  date.value="";time.value="";area.value="";cat.value="";gender.value="";type.value="";teams.value="";note.value="";
  postMsg.innerHTML='<div class="success">✅ 募集を登録しました</div>';
  react(btn,"登録完了");render();
}
function approved(mid){return entries.filter(e=>e.matchId===mid&&e.status==="承認済み").length}
function remain(m){return Math.max(Number(m.teams)-approved(m.id),0)}
function createEntry(mid,comment){
  let m=matches.find(x=>x.id===mid);
  if(!active){alert("先にAまたはBに切り替えてください");return}
  if(m.teamId===active.id){alert("自チームの募集には応募できません");return}
  if(entries.some(e=>e.matchId===mid&&e.teamId===active.id&&e.status!=="取消")){alert("すでに応募済みです");return}
  entries.push({id:Date.now(),matchId:mid,teamId:active.id,teamName:active.name,teamLeader:active.leader,teamEmail:active.email,teamArea:active.area,teamJba:active.jba,comment,status:"申請中"});
  m.status="応募あり";save();render();
}
function approve(id,btn){let e=entries.find(x=>x.id===id);if(e)e.status="承認済み";save();react(btn,"承認済み");render()}
function reject(id,btn){let e=entries.find(x=>x.id===id);if(e)e.status="見送り";save();react(btn,"見送り済");render()}
function cancelEntry(id,btn){let e=entries.find(x=>x.id===id);if(!confirm("相手チームへ直接連絡済みですか？"))return;if(e)e.status="取消";save();react(btn,"取消済");render()}
function closeMatch(id,btn){let m=matches.find(x=>x.id===id);if(m)m.status="募集終了";save();react(btn,"終了済");render()}

function renderList(){
  if(!matches.length){matchList.innerHTML='<div class="empty">募集はありません。</div>';return}
  matchList.innerHTML=matches.filter(m=>m.status!=="募集終了").map(m=>{
    let mine=active&&m.teamId===active.id;
    let already=active&&entries.some(e=>e.matchId===m.id&&e.teamId===active.id&&e.status!=="取消");
    return `<div class="card">
      <div class="title">${m.date} ${m.time} ${m.type}</div>
      <div class="row">主催：${m.teamName}</div>
      <div class="big">残り ${remain(m)} チーム</div>
      <span class="badge">${m.area}</span><span class="badge">${m.cat}</span><span class="badge">${m.gender}</span>
      <div class="row">${m.note||""}</div>
      ${mine?'<button class="done" disabled>自チームの募集</button>':already?'<button class="done" disabled>応募済み</button>':active?`<textarea id="c${m.id}" placeholder="応募コメント"></textarea><button onclick="createEntry(${m.id},document.getElementById('c${m.id}').value||'よろしくお願いします。');react(this,'応募完了')">対戦希望を送る</button>`:'<button class="done" disabled>先にチームを切替</button>'}
    </div>`;
  }).join("");
}
function renderMy(){
  teamInfo.innerHTML=active?`<div class="row">チーム名：${active.name}</div><div class="row">代表：${active.leader}</div><div class="row">地域：${active.area}</div>`:'<div class="empty">操作中チームが未設定です。</div>';
  let mine=active?matches.filter(m=>m.teamId===active.id):[];
  applicants.innerHTML=mine.flatMap(m=>entries.filter(e=>e.matchId===m.id&&e.status==="申請中").map(e=>`<div class="box">
    <b>${m.date} ${m.type}</b>
    <div class="row">応募チーム：${e.teamName}</div>
    <div class="row">代表：${e.teamLeader}</div>
    <div class="row">地域：${e.teamArea}｜JBA：${e.teamJba}</div>
    <div class="row">コメント：${e.comment}</div>
    <p class="note">※メールは承認後に表示する想定です。</p>
    <button class="ok" onclick="approve(${e.id},this)">対戦決定</button>
    <button class="danger" onclick="reject(${e.id},this)">今回は見送り</button>
  </div>`)).join("")||'<div class="empty">応募はまだありません。</div>';
  myMatches.innerHTML=mine.map(m=>`<div class="box"><b>${m.date} ${m.type}</b><div class="row">募集${m.teams}｜承認${approved(m.id)}｜残り${remain(m)}</div><button class="sub" onclick="closeMatch(${m.id},this)">募集終了</button></div>`).join("")||'<div class="empty">自チームの募集はありません。</div>';
  myEntries.innerHTML=active?entries.filter(e=>e.teamId===active.id&&e.status!=="取消").map(e=>{let m=matches.find(x=>x.id===e.matchId);return m?`<div class="box"><b>${m.date} ${m.type}</b><div class="row">主催：${m.teamName}</div><div class="row">状態：${e.status}</div>${e.status==="承認済み"?`<div class="row">主催者：${m.teamLeader}｜メール：${m.teamEmail}</div>`:""}<button class="danger" onclick="cancelEntry(${e.id},this)">応募取消</button></div>`:""}).join("")||'<div class="empty">エントリー中の試合はありません。</div>':'<div class="empty">チーム未設定です。</div>';
}
function render(){
  nowTeam.textContent="操作中チーム："+(active?active.name:"未設定");
  matchCount.textContent=matches.filter(m=>m.status==="募集中").length;
  entryCount.textContent=entries.filter(e=>e.status==="申請中").length;
  closedCount.textContent=matches.filter(m=>m.status==="募集終了").length;
  renderList();renderMy();
}
render();
</script>
</body>
</html>
