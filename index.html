<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex,nofollow"><title>Basket Match</title><style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#f4f6f8;color:#111}header{position:sticky;top:0;background:#fff;padding:14px;border-bottom:1px solid #ddd;z-index:10}h1{margin:0;font-size:24px}.counter{font-size:14px;color:#555}.counter b{font-size:20px;color:#2f55d4}.tabs{display:flex;gap:6px;margin-top:12px;overflow-x:auto}.tab{white-space:nowrap;padding:10px 14px;border-radius:999px;background:#eee;color:#2878ff;font-weight:700}.tab.active{background:#2f55d4;color:#fff}.page{display:none;padding:16px}.page.active{display:block}.card{background:#fff;border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px #0001}.title{font-size:21px;font-weight:800}.row{font-size:15px;color:#555;margin:6px 0}.label{font-size:19px;font-weight:800;margin:16px 0 8px}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:10px;padding:12px;font-size:16px;background:#fff}textarea{min-height:80px}button{width:100%;border:0;background:#2f55d4;color:#fff;font-size:18px;padding:14px;border-radius:12px;margin-top:10px;font-weight:700}.sub{background:#666}.danger{background:#c0392b}.ok{background:#07833e}.warn{background:#d98c00}.done{background:#aaa}.note{font-size:14px;color:#666;line-height:1.6}.filterGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.badge{display:inline-block;background:#eef2ff;color:#2f55d4;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700;margin:4px 3px 0 0}.status{background:#e8fff0;color:#07833e}.closed{background:#eee;color:#777}.formed{background:#fff4db;color:#a66b00}.cancel{background:#ffe7e7;color:#b00020}.teamHead{display:flex;gap:12px;align-items:center}.icon{width:46px;height:46px;border-radius:50%;background:#eef2ff;display:flex;align-items:center;justify-content:center;font-size:24px}.checkGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.check{border:1px solid #ddd;border-radius:10px;padding:11px;background:#fafafa}.check input{width:auto}.history{background:#fafafa;border-radius:12px;padding:10px;margin-top:8px}.success{background:#e8fff0;color:#07833e;border-radius:12px;padding:10px;margin-top:10px}.empty{padding:18px;background:#fff;border-radius:16px;color:#666}
</style></head><body><header><h1>Basket Match</h1><div class="counter">募集中：<b id="matchCount">0</b>｜調整中：<b id="adjustCount">0</b>｜成立済み：<b id="formedCount">0</b>｜キャンセル：<b id="cancelCount">0</b></div><div class="tabs"><div class="tab active" onclick="showPage('team',this)">チーム登録</div><div class="tab" onclick="showPage('list',this)">試合を探す</div><div class="tab" onclick="showPage('post',this)">試合を募集</div><div class="tab" onclick="showPage('status',this)">自チーム情報</div></div></header>

<div id="team" class="page active"><div class="card"><div class="title">チーム登録</div><div class="label">チーム名</div><input id="teamName" placeholder="例：EPIC BASKETBALL"><div class="label">代表者名</div><input id="leaderName" placeholder="例：大西"><div class="label">活動地域</div><select id="teamArea"><option value="">選択してください</option><option>神戸</option><option>阪神</option><option>東播</option><option>西播</option><option>北播</option><option>丹波</option><option>但馬</option><option>淡路</option></select><div class="label">JBA登録</div><select id="teamJba"><option value="">選択してください</option><option>あり</option><option>なし</option></select><div class="label">メール</div><input id="teamEmail" type="email" placeholder="example@gmail.com"><button id="teamSaveBtn" onclick="saveTeam()">チーム登録する</button><p id="teamStatus" class="note"></p></div></div>

<div id="list" class="page"><div class="card"><div class="title">試合を探す</div><div class="filterGrid"><select id="fArea" onchange="renderMatches()"><option value="">地域すべて</option><option>神戸</option><option>阪神</option><option>東播</option><option>西播</option><option>北播</option><option>丹波</option><option>但馬</option><option>淡路</option></select><select id="fCat" onchange="renderMatches()"><option value="">カテゴリーすべて</option><option>U12</option><option>U11</option><option>U10</option><option>U9</option></select><select id="fGender" onchange="renderMatches()"><option value="">性別すべて</option><option>男子</option><option>女子</option></select><select id="fType" onchange="renderMatches()"><option value="">種別すべて</option><option>練習試合</option><option>大会</option><option>合同練習</option></select></div></div><div id="matchList"></div></div>

<div id="detail" class="page"><div class="card"><div id="dHeader"></div><div id="dContent"></div><button id="entryBtn" onclick="entryCurrent()">対戦希望を送る</button><button class="sub" onclick="showPageById('list')">一覧に戻る</button></div></div>

<div id="post" class="page"><div class="card"><div class="title" id="postTitle">試合を募集</div><div class="label">日付</div><input id="postDate" type="date"><div class="label">募集締切</div><input id="postDeadline" type="date"><div class="label">時間帯</div><select id="postTime"><option value="">選択してください</option><option>AM</option><option>PM</option><option>終日</option></select><div class="label">地域</div><select id="postArea"><option value="">選択してください</option><option>神戸</option><option>阪神</option><option>東播</option><option>西播</option><option>北播</option><option>丹波</option><option>但馬</option><option>淡路</option></select><div class="label">カテゴリー</div><div class="checkGrid" id="postCats"><label class="check"><input type="checkbox" value="U12">U12</label><label class="check"><input type="checkbox" value="U11">U11</label><label class="check"><input type="checkbox" value="U10">U10</label><label class="check"><input type="checkbox" value="U9">U9</label></div><div class="label">性別</div><div class="checkGrid" id="postGenders"><label class="check"><input type="checkbox" value="男子">男子</label><label class="check"><input type="checkbox" value="女子">女子</label></div><div class="label">試合の種類</div><select id="postType"><option value="">選択してください</option><option>練習試合</option><option>大会</option><option>合同練習</option></select><div class="label">レベル</div><select id="postLevel"><option value="">選択してください</option><option>指定なし</option><option>県上位</option><option>県中位</option><option>市内</option><option>地域</option></select><div class="label">募集チーム数</div><select id="postTeams"><option value="">選択してください</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select><div class="label">詳細・備考</div><textarea id="postNote" placeholder="会場、条件、試合数など"></textarea><button id="postBtn" onclick="saveMatch()">募集を登録する</button><p id="postStatus" class="note"></p><p class="note">登録後は入力欄が空白に戻ります。編集・成立・中止は自チーム情報から操作します。</p></div></div>

<div id="status" class="page"><div class="card"><div class="title">自チーム情報・募集管理</div><div class="row">チーム名：<span id="statusTeamName">未登録</span></div><div class="row">代表者：<span id="statusLeader">未登録</span></div><div class="row">地域：<span id="statusArea">未登録</span></div><div class="row">JBA：<span id="statusJba">未登録</span></div><hr><div class="title">自チームの募集</div><div id="myMatches"></div><hr><div class="title">応募管理</div><div id="myApplicants"></div><hr><div class="title">エントリー中</div><div id="myEntries"></div><hr><div class="title">過去履歴</div><div id="pastMatches"></div></div></div>

<script>
let team=JSON.parse(localStorage.getItem("team")||"null"),matches=JSON.parse(localStorage.getItem("matches")||"[]"),entries=JSON.parse(localStorage.getItem("entries")||"[]"),cancels=JSON.parse(localStorage.getItem("cancels")||"[]"),currentId=null,editId=null;
function today(){return new Date().toISOString().slice(0,10)}
function mailOk(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)}
function vals(id){return [...document.querySelectorAll("#"+id+" input:checked")].map(x=>x.value)}
function checks(id,a){document.querySelectorAll("#"+id+" input").forEach(x=>x.checked=a.includes(x.value))}
function isPast(m){return m.date<today()}
function approved(id){return entries.filter(e=>e.matchId===id&&e.status==="承認済み").length}
function pending(id){return entries.filter(e=>e.matchId===id&&e.status==="申請中").length}
function ext(m){return Number(m.external||0)}
function remain(m){return Math.max(m.teams-approved(m.id)-ext(m),0)}
function active(m){return m.date>=today()&&m.status==="募集中"&&remain(m)>0&&(!m.deadline||m.deadline>=today())}
function cls(s){return s==="成立済み"?"formed":s==="調整中"?"warn":s==="受付終了"?"closed":s==="中止"?"cancel":"status"}
function showPage(id,el){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));if(el)el.classList.add("active");refresh()}
function showPageById(id){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));let l={team:"チーム登録",list:"試合を探す",post:"試合を募集",status:"自チーム情報"}[id];document.querySelectorAll(".tab").forEach(t=>{if(t.textContent.includes(l))t.classList.add("active")});refresh()}
function saveTeam(){let name=teamName.value.trim(),leader=leaderName.value.trim(),email=teamEmail.value.trim();if(!name||!leader||!email||!teamArea.value||!teamJba.value){alert("チーム名、代表者名、地域、JBA、メールは必須です");return}if(!mailOk(email)){alert("有効なメールアドレスを入力してください");return}team={name,leader,email,area:teamArea.value,jba:teamJba.value};localStorage.setItem("team",JSON.stringify(team));teamSaveBtn.disabled=true;teamSaveBtn.textContent="登録完了！";teamStatus.innerHTML='<div class="success">✅ チーム登録が完了しました</div>';setTimeout(()=>{teamName.value="";leaderName.value="";teamEmail.value="";teamArea.value="";teamJba.value="";teamStatus.innerHTML="";teamSaveBtn.disabled=false;teamSaveBtn.textContent="チーム登録する";showPageById("status")},900);refresh()}
function resetPost(){editId=null;postTitle.textContent="試合を募集";postBtn.textContent="募集を登録する";postDate.value="";postDeadline.value="";postTime.value="";postArea.value="";postType.value="";postLevel.value="";postTeams.value="";postNote.value="";checks("postCats",[]);checks("postGenders",[])}
function saveMatch(){if(!team){alert("先にチーム登録してください");showPageById("team");return}if(!postDate.value||!postTime.value||!postArea.value||!postType.value||!postLevel.value||!postTeams.value){alert("日付、時間帯、地域、試合種類、レベル、募集チーム数は必須です");return}if(postDate.value<today()){alert("過去の日付では募集できません");return}if(postDeadline.value&&postDeadline.value>postDate.value){alert("締切は試合日以前にしてください");return}let cats=vals("postCats"),genders=vals("postGenders");if(!cats.length||!genders.length){alert("カテゴリーと性別を選択してください");return}postBtn.disabled=true;postBtn.textContent="登録中...";let base={teamName:team.name,teamEmail:team.email,date:postDate.value,deadline:postDeadline.value,time:postTime.value,area:postArea.value,cats,genders,type:postType.value,level:postLevel.value,teams:Number(postTeams.value),note:postNote.value};if(editId){let m=matches.find(x=>x.id===editId);if(base.teams<approved(editId)+ext(m)){alert("承認済み＋外部確定より少ない募集数にはできません");postBtn.disabled=false;postBtn.textContent="募集を更新する";return}Object.assign(m,base);localStorage.setItem("matches",JSON.stringify(matches));postStatus.innerHTML='<div class="success">✅ 募集内容を更新しました</div>'}else{matches.unshift({...base,id:Date.now(),status:"募集中",external:0});localStorage.setItem("matches",JSON.stringify(matches));postStatus.innerHTML='<div class="success">✅ 募集を登録しました</div>'}postBtn.textContent=editId?"更新完了！":"登録完了！";setTimeout(()=>{resetPost();postBtn.disabled=false;postStatus.innerHTML="";showPageById("status")},900);refresh()}
function renderMatches(){let area=fArea?.value||"",cat=fCat?.value||"",gender=fGender?.value||"",type=fType?.value||"",list=matchList;if(!list)return;let fs=matches.filter(active).filter(m=>(!area||m.area===area)&&(!cat||m.cats.includes(cat))&&(!gender||m.genders.includes(gender))&&(!type||m.type===type));if(!fs.length){list.innerHTML='<div class="empty">現在、条件に合う募集はありません。</div>';return}list.innerHTML=fs.map(m=>`<div class="card"><div class="teamHead"><div class="icon">🏀</div><div><div class="title">${m.date} ${m.time} ${m.type}</div><div class="row"><b>${m.teamName}</b></div></div></div><span class="badge ${cls(m.status)}">${m.status}</span><span class="badge">承認 ${approved(m.id)}</span><span class="badge">外部 ${ext(m)}</span><span class="badge">残り ${remain(m)}</span><div class="row">${m.area}｜${m.cats.join("/")}｜${m.genders.join("/")}</div><button onclick="openDetail(${m.id})">詳細を見る</button></div>`).join("")}
function openDetail(id){let m=matches.find(x=>x.id===id);if(!m)return;currentId=id;dHeader.innerHTML=`<div class="teamHead"><div class="icon">🏀</div><div><div class="title">${m.date} ${m.time} ${m.type}</div><div class="row"><b>${m.teamName}</b></div></div></div>`;dContent.innerHTML=`<span class="badge ${cls(m.status)}">${m.status}</span><span class="badge">募集 ${m.teams}</span><span class="badge">承認 ${approved(m.id)}</span><span class="badge">外部 ${ext(m)}</span><span class="badge">残り ${remain(m)}</span><div class="row">地域：${m.area}</div><div class="row">カテゴリー：${m.cats.join("/")}</div><div class="row">性別：${m.genders.join("/")}</div><div class="row">締切：${m.deadline||"未設定"}</div><div class="row">詳細：${m.note||"未入力"}</div>`;let own=team&&m.teamEmail===team.email,entered=entries.some(e=>team&&e.matchId===id&&e.teamEmail===team.email&&e.status!=="キャンセル"&&e.status!=="却下");entryBtn.disabled=own||entered||!active(m);entryBtn.className=entryBtn.disabled?"done":"";entryBtn.textContent=own?"自チームの募集です":entered?"エントリー済み":!active(m)?"受付終了":"対戦希望を送る";showPageById("detail")}
function entryCurrent(){let m=matches.find(x=>x.id===currentId);if(!team){alert("先にチーム登録してください");return}if(!active(m)){alert("受付終了です");return}entries.push({id:Date.now(),matchId:m.id,teamName:team.name,teamEmail:team.email,status:"申請中"});localStorage.setItem("entries",JSON.stringify(entries));if(m.status==="募集中")m.status="調整中";localStorage.setItem("matches",JSON.stringify(matches));alert("対戦希望を送信しました");refresh();openDetail(m.id)}
function approveEntry(id){let e=entries.find(x=>x.id===id),m=matches.find(x=>x.id===e?.matchId);if(!e||!m)return;if(remain(m)<=0){alert("残り枠がありません。募集数を増やすか外部確定数を調整してください。");return}e.status="承認済み";localStorage.setItem("entries",JSON.stringify(entries));refresh()}
function rejectEntry(id){let e=entries.find(x=>x.id===id);if(e)e.status="却下";localStorage.setItem("entries",JSON.stringify(entries));refresh()}
function editMatch(id){let m=matches.find(x=>x.id===id);editId=id;postTitle.textContent="募集を編集";postBtn.textContent="募集を更新する";postDate.value=m.date;postDeadline.value=m.deadline||"";postTime.value=m.time;postArea.value=m.area;checks("postCats",m.cats);checks("postGenders",m.genders);postType.value=m.type;postLevel.value=m.level;postTeams.value=m.teams;postNote.value=m.note||"";showPageById("post")}
function changeStatus(id,s){let m=matches.find(x=>x.id===id);m.status=s;localStorage.setItem("matches",JSON.stringify(matches));refresh()}
function changeExternal(id){let m=matches.find(x=>x.id===id),v=Number(prompt("外部で確定したチーム数",m.external||0));if(isNaN(v)||v<0)return;if(approved(id)+v>m.teams){alert("承認済み＋外部確定が募集数を超えます");return}m.external=v;localStorage.setItem("matches",JSON.stringify(matches));refresh()}
function deadlineAction(id,act){let m=matches.find(x=>x.id===id);if(act==="extend"){let d=prompt("新しい締切日 YYYY-MM-DD",m.deadline||today());if(d)m.deadline=d}else if(act==="practice"){m.type="練習試合"}else if(act==="cancel"){m.status="中止"}else if(act==="formed"){m.status="成立済み"}localStorage.setItem("matches",JSON.stringify(matches));refresh()}
function deleteMatch(id){if(entries.some(e=>e.matchId===id)){alert("応募がある募集は削除不可。中止か受付終了にしてください。");return}matches=matches.filter(m=>m.id!==id);localStorage.setItem("matches",JSON.stringify(matches));refresh()}
function cancelEntry(id){let e=entries.find(x=>x.id===id);if(!confirm("相手チームへ直接連絡済みですか？")){alert("先に直接連絡してください");return}let r=prompt("理由","体調不良・感染症");if(!r)return;e.status="キャンセル";cancels.push({date:today(),reason:r,matchId:e.matchId});localStorage.setItem("entries",JSON.stringify(entries));localStorage.setItem("cancels",JSON.stringify(cancels));refresh()}
function renderStatus(){let mine=team?matches.filter(m=>m.teamEmail===team.email):[];myMatches.innerHTML=mine.filter(m=>!isPast(m)).map(m=>`<div class="history"><b>${m.date} ${m.type}</b><div class="row">募集${m.teams}｜承認${approved(m.id)}｜申請${pending(m.id)}｜外部${ext(m)}｜残り${remain(m)}</div><span class="badge ${cls(m.status)}">${m.status}</span><select onchange="changeStatus(${m.id},this.value)"><option ${m.status==="募集中"?"selected":""}>募集中</option><option ${m.status==="調整中"?"selected":""}>調整中</option><option ${m.status==="受付終了"?"selected":""}>受付終了</option><option ${m.status==="成立済み"?"selected":""}>成立済み</option><option ${m.status==="中止"?"selected":""}>中止</option></select><button onclick="editMatch(${m.id})">編集</button><button onclick="changeExternal(${m.id})">外部確定数</button><button class="warn" onclick="deadlineAction(${m.id},'extend')">締切延長</button><button class="warn" onclick="deadlineAction(${m.id},'practice')">練習試合へ変更</button><button class="ok" onclick="deadlineAction(${m.id},'formed')">このまま成立</button><button class="danger" onclick="deadlineAction(${m.id},'cancel')">中止</button><button class="danger" onclick="deleteMatch(${m.id})">削除</button></div>`).join("")||'<div class="empty">自チーム募集なし</div>';myApplicants.innerHTML=mine.flatMap(m=>entries.filter(e=>e.matchId===m.id&&e.status==="申請中").map(e=>`<div class="history"><b>${m.date} ${m.type}</b><div class="row">申請：${e.teamName}</div><button class="ok" onclick="approveEntry(${e.id})">承認</button><button class="danger" onclick="rejectEntry(${e.id})">却下</button></div>`)).join("")||'<div class="empty">申請なし</div>';let myEnt=entries.filter(e=>team&&e.teamEmail===team.email&&e.status!=="却下"&&e.status!=="キャンセル");myEntries.innerHTML=myEnt.map(e=>{let m=matches.find(x=>x.id===e.matchId);return m?`<div class="history"><b>${m.date} ${m.type}</b><div class="row">${m.teamName}｜${e.status}</div><button class="danger" onclick="cancelEntry(${e.id})">キャンセル</button></div>`:""}).join("")||'<div class="empty">エントリーなし</div>';pastMatches.innerHTML=mine.filter(isPast).map(m=>`<div class="history">${m.date} ${m.type}｜${m.status}</div>`).join("")||'<div class="empty">過去履歴なし</div>'}
function refresh(){postDate.min=today();if(team){statusTeamName.textContent=team.name;statusLeader.textContent=team.leader;statusArea.textContent=team.area;statusJba.textContent=team.jba}matchCount.textContent=matches.filter(active).length;adjustCount.textContent=matches.filter(m=>m.status==="調整中").length;formedCount.textContent=matches.filter(m=>m.status==="成立済み").length;cancelCount.textContent=cancels.length;renderMatches();renderStatus()}refresh();
</script></body></html>
